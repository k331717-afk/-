name: Daily Imweb Sales Report

on:
  schedule:
    # 09:07 Asia/Seoul = 00:07 UTC
    - cron: "7 0 * * *"
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      SEND_KAKAO: "false"
      SEND_NOTION: "true"
      DRY_RUN: "false"

      IMWEB_BASE_URL: "https://api.imweb.me"
      IMWEB_AUTH_ENDPOINT: "/v2/auth"
      IMWEB_ORDERS_ENDPOINT: "/v2/shop/orders"
      IMWEB_ACCESS_TOKEN_HEADER: "access-token"
      IMWEB_ACCESS_TOKEN_SCHEME: ""
      IMWEB_DATE_FORMAT: "timestamp"
      IMWEB_PARAM_START_DATE: "start_date"
      IMWEB_PARAM_END_DATE: "end_date"
      IMWEB_PARAM_PAGE: "offset"
      IMWEB_PARAM_LIMIT: "limit"
      IMWEB_PAGE_SIZE: "50"
      IMWEB_MAX_PAGES: "100"
      IMWEB_TOO_MANY_REQUEST_RETRIES: "3"
      IMWEB_TOO_MANY_REQUEST_SLEEP_SECONDS: "10"
      IMWEB_PROD_ORDERS_ENDPOINT_TEMPLATE: "/v2/shop/orders/{order_no}/prod-orders"

      REQUEST_TIMEOUT_SECONDS: "30"
      REQUEST_SLEEP_SECONDS: "1.5"

      IMWEB_API_KEY: ${{ secrets.IMWEB_API_KEY }}
      IMWEB_SECRET_KEY: ${{ secrets.IMWEB_SECRET_KEY }}
      IMWEB_SHOP_CODE: ${{ secrets.IMWEB_SHOP_CODE }}
      NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
      NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}

      NOTION_PROP_TITLE: ${{ vars.NOTION_PROP_TITLE }}
      NOTION_PROP_DATE: ${{ vars.NOTION_PROP_DATE }}
      NOTION_PROP_TOTAL_ORDERS: ${{ vars.NOTION_PROP_TOTAL_ORDERS }}
      NOTION_PROP_TOTAL_QUANTITY: ${{ vars.NOTION_PROP_TOTAL_QUANTITY }}
      NOTION_PROP_TOTAL_AMOUNT: ${{ vars.NOTION_PROP_TOTAL_AMOUNT }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install -r imweb_daily_report/requirements.txt

      - name: Run daily report
        run: python imweb_daily_report/main.py
