name: Weekly Competitor Report

on:
  workflow_dispatch: # 수동 실행 버튼
  schedule:
    - cron: '0 0 * * 1' # 매주 월요일 자동 실행

jobs:
  run-scripts:
    runs-on: ubuntu-latest

    steps:
    - name: 저장소 코드 불러오기
      uses: actions/checkout@v3

    - name: 파이썬 환경 세팅
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 필요 패키지 설치
      run: |
        python -m pip install --upgrade pip
        pip install google-generativeai requests python-dotenv

    - name: 1. 인스타그램 경쟁사 리포트 실행
      env:
        RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        NOTION_API_TOKEN: ${{ secrets.NOTION_API_TOKEN }} # [수정 완료] 이름표 매칭 통일
        NOTION_CONTENT_DB_ID: ${{ secrets.NOTION_CONTENT_DB_ID }}
      run: python ig_competitor_report.py

    - name: 2. 메타 광고 리포트 실행
      env:
        RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        NOTION_API_TOKEN: ${{ secrets.NOTION_API_TOKEN }} # [수정 완료] 이름표 매칭 통일
        NOTION_META_AD_DB_ID: ${{ secrets.NOTION_META_AD_DB_ID }}
      run: python meta_ad_report.py
