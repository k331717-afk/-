name: weekly-competitor-report

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 1'

jobs:
  run-scripts:
    runs-on: ubuntu-latest

    steps:
    - name: checkout
      uses: actions/checkout@v3

    - name: setup-python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: install-packages
      run: |
        python -m pip install --upgrade pip
        # 🚨 여기서 google-genai로 설치하도록 최종 수정되었습니다.
        pip install google-genai requests python-dotenv

    - name: run-instagram-report
      env:
        RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        NOTION_API_TOKEN: ${{ secrets.NOTION_API_TOKEN }}
        NOTION_CONTENT_DB_ID: ${{ secrets.NOTION_CONTENT_DB_ID }}
      run: python ig_competitor_report.py

    - name: run-meta-ad-report
      env:
        RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        NOTION_API_TOKEN: ${{ secrets.NOTION_API_TOKEN }}
        NOTION_META_AD_DB_ID: ${{ secrets.NOTION_META_AD_DB_ID }}
      run: python meta_ad_report.py
