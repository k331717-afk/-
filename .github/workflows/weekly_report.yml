name: weekly-competitor-report

on:
  workflow_dispatch:
  schedule:
    - cron: '7 0 * * 1'  # 한국 시간 매주 월요일 오전 9시 7분 실행

jobs:
  run-scripts:
    runs-on: ubuntu-latest

    steps:
    - name: checkout
      uses: actions/checkout@v3

    - name: setup-python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: install-packages
      run: |
        python -m pip install --upgrade pip
        pip install google-genai requests python-dotenv pandas playwright
        python -m playwright install chromium --with-deps

    - name: run-instagram-report
      env:
        META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
        RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        NOTION_API_TOKEN: ${{ secrets.NOTION_API_TOKEN }}
        NOTION_CONTENT_DB_ID: ${{ secrets.NOTION_CONTENT_DB_ID }}
        IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        OPENAI_IMAGE_MODEL: ${{ vars.OPENAI_IMAGE_MODEL }}
      run: python ig_competitor_report.py

    - name: run-meta-ad-report
      env:
        RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        NOTION_API_TOKEN: ${{ secrets.NOTION_API_TOKEN }}
        NOTION_META_AD_DB_ID: ${{ secrets.NOTION_META_AD_DB_ID }}
        IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}
      run: python meta_ad_report.py

    - name: run-meta-weekly-report
      env:
        META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
        META_AD_ACCOUNT_ID: ${{ secrets.META_AD_ACCOUNT_ID }}
        SMTP_USER: ${{ secrets.SMTP_USER }}
        SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        REPORT_RECIPIENT: ${{ secrets.REPORT_RECIPIENT }}
        NOTION_API_TOKEN: ${{ secrets.NOTION_API_TOKEN }}
        NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        OPENAI_IMAGE_MODEL: ${{ vars.OPENAI_IMAGE_MODEL }}
      run: python meta_weekly_report.py
