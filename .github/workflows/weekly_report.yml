name: weekly-competitor-report

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

jobs:
  run-reports:
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v3

      - name: setup-python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: install-packages
        run: pip install apify-client google-generativeai python-dotenv requests

      - name: run-instagram-report
        env:
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NOTION_API_TOKEN: ${{ secrets.NOTION_API_TOKEN }}
          NOTION_CONTENT_DB_ID: ${{ secrets.NOTION_CONTENT_DB_ID }}
        run: python ig_competitor_report.py

      - name: run-meta-ad-report
        env:
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NOTION_API_TOKEN: ${{ secrets.NOTION_API_TOKEN }}
          NOTION_META_AD_DB_ID: ${{ secrets.NOTION_META_AD_DB_ID }}
        run: python meta_ad_report.py

