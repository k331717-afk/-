name: 주간 경쟁사 분석 리포트

on:
  schedule:
    - cron: '0 0 * * 1'  # 매주 월요일 오전 9시 (KST = UTC+9)
  workflow_dispatch:       # 수동 실행 버튼도 추가

jobs:
  run-reports:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v3

      - name: Python 설치
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install apify-client google-generativeai python-dotenv requests

      - name: 인스타그램 경쟁사 분석
        env:
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NOTION_API_TOKEN: ${{ secrets.NOTION_API_TOKEN }}
          NOTION_CONTENT_DB_ID: ${{ secrets.NOTION_CONTENT_DB_ID }}
        run: python ig_competitor_report.py

      - name: Meta 광고 경쟁사 분석
        env:
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NOTION_API_TOKEN: ${{ secrets.NOTION_API_TOKEN }}
          NOTION_META_AD_DB_ID: ${{ secrets.NOTION_META_AD_DB_ID }}
        run: python meta_ad_report.py
